basePath: /api/v1/auth
definitions:
  nrs-authentication_internal_dto.AcceptInviteResponse:
    properties:
      invite: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  nrs-authentication_internal_dto.AttachRoleResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  nrs-authentication_internal_dto.CreateInviteRequest:
    properties:
      organizationId:
        maxLength: 100
        minLength: 1
        type: string
      organizationName:
        maxLength: 255
        minLength: 1
        type: string
      roleName:
        maxLength: 100
        minLength: 3
        type: string
      targetEmail:
        type: string
    required:
    - organizationId
    - organizationName
    - roleName
    - targetEmail
    type: object
  nrs-authentication_internal_dto.InviteResponse:
    properties:
      accepted:
        type: boolean
      createdAt:
        type: string
      id:
        type: string
      organizationId:
        type: string
      organizationName:
        type: string
      roleName:
        type: string
      sent:
        type: boolean
      targetEmail:
        type: string
      updatedAt:
        type: string
    type: object
  nrs-authentication_internal_dto.UserOrganizationMappingResponse:
    properties:
      active:
        type: boolean
      createdAt:
        type: string
      id:
        type: string
      organizationId:
        type: string
      organizationName:
        type: string
      roleName:
        type: string
      updatedAt:
        type: string
      userEmail:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Handles authentication utilities
  title: nrs-authentication
  version: "1.0"
paths:
  /invites/{inviteId}/accept:
    get:
      consumes:
      - application/json
      description: Marks an invite as accepted.
      parameters:
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AcceptInviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AcceptInviteResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AcceptInviteResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AcceptInviteResponse'
      summary: Accept invite
      tags:
      - invites
  /invites/{inviteId}/attach-role:
    post:
      consumes:
      - application/json
      description: Attaches the invited role after the invite is accepted.
      parameters:
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AttachRoleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AttachRoleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AttachRoleResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.AttachRoleResponse'
      summary: Attach role from invite
      tags:
      - invites
  /me/invites:
    post:
      consumes:
      - application/json
      description: Creates an invite, sends the email, and stores invite metadata.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Create invite request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/nrs-authentication_internal_dto.CreateInviteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nrs-authentication_internal_dto.InviteResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Invite a user by email
      tags:
      - invites
  /me/invites/pending:
    get:
      consumes:
      - application/json
      description: Returns all invites that have not been accepted.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Organization ID
        in: query
        name: organizationId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/nrs-authentication_internal_dto.InviteResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List pending invites
      tags:
      - invites
  /me/organizations:
    get:
      consumes:
      - application/json
      description: Returns the organizations the authenticated user belongs to.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/nrs-authentication_internal_dto.UserOrganizationMappingResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List authenticated user's organizations
      tags:
      - organizations
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
